name: MCP InfluxDB Server
version: "1.0.2"
slug: mcp-influxdb
description: MCP server for InfluxDB 1.8.x queries via HTTP/SSE
url: https://github.com/Kokbo/ha-mcp-addons
arch:
  - aarch64
host_network: true
ports:
  3004/tcp: 3004
ports_description:
  3004/tcp: MCP HTTP/SSE server
options:
  port: 3004
  influxdb_url: "http://localhost:8086"
  influxdb_database: homeassistant
  influxdb_user: ""
  influxdb_password: ""
schema:
  port: int
  influxdb_url: str
  influxdb_database: str
  influxdb_user: str
  influxdb_password: str
init: false
