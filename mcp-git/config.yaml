name: MCP Git Server
version: "1.0.1"
slug: mcp-git
description: MCP server exposing git operations on /config via Streamable HTTP
url: https://github.com/Kokbo/ha-mcp-addons
arch:
  - aarch64
host_network: true
ports:
  3002/tcp: 3002
ports_description:
  3002/tcp: MCP Streamable HTTP server
map:
  - config:rw
options:
  port: 3002
  repo_path: /config
  ssh_key_path: /config/.ssh/id_rsa
schema:
  port: int
  repo_path: str
  ssh_key_path: str
init: false
