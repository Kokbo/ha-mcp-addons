name: MCP Filesystem Server
version: "1.0.4"
slug: mcp-filesystem
description: MCP server exposing read/write access to /config via Streamable HTTP
url: https://github.com/Kokbo/ha-mcp-addons
arch:
  - aarch64
host_network: true
ports:
  3001/tcp: 3001
ports_description:
  3001/tcp: MCP Streamable HTTP server
map:
  - config:rw
options:
  port: 3001
  allowed_paths:
    - /config
schema:
  port: int
  allowed_paths:
    - str
init: false
